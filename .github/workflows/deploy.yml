name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

# Prevent concurrent deployments stacking up
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Pull & Rebuild on Droplet
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Install SSH key and add the droplet to known_hosts
      # ------------------------------------------------------------------
      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Trust the host fingerprint without interactive prompting
          ssh-keyscan -H "$DROPLET_HOST" >> ~/.ssh/known_hosts

      # ------------------------------------------------------------------
      # 2. Pull latest code and rebuild the Docker Compose cluster
      # ------------------------------------------------------------------
      - name: Pull code & rebuild cluster
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              "$DROPLET_USER@$DROPLET_HOST" \
              'set -euo pipefail
               cd /root/jizifin
               echo "==> Pulling latest commits from origin/main..."
               git pull origin main
               echo "==> Rebuilding Docker Compose cluster..."
               docker compose up --build -d
               echo "==> Rebuild triggered successfully."'

      # ------------------------------------------------------------------
      # 3. Wait for containers to reach a stable state, then health-check
      #    each service defined in docker-compose.yml.
      #    Exit code 0  -> all healthy.
      #    Exit code 1  -> at least one service is degraded (captured below).
      # ------------------------------------------------------------------
      - name: Verify service health
        id: health_check
        continue-on-error: true
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          FAILED_REPORT=$(ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              "$DROPLET_USER@$DROPLET_HOST" \
              'set -uo pipefail
               cd /root/jizifin

               # Give containers time to start and pass their start_period checks.
               # Longest start_period in compose is 5s; we wait generously longer.
               echo "==> Waiting 90 s for containers to stabilise..."
               sleep 90

               FAILED=""

               # Iterate over every service defined in the compose file
               SERVICES=$(docker compose ps --services 2>/dev/null)
               for SVC in $SERVICES; do
                 CONTAINER=$(docker compose ps -q "$SVC" 2>/dev/null | head -1)
                 if [ -z "$CONTAINER" ]; then
                   echo "WARNING: no container found for service $SVC" >&2
                   continue
                 fi

                 STATUS=$(docker inspect --format="{{.State.Status}}" "$CONTAINER" 2>/dev/null)
                 HEALTH=$(docker inspect --format="{{if .State.Health}}{{.State.Health.Status}}{{else}}no-healthcheck{{end}}" "$CONTAINER" 2>/dev/null)

                 echo "Service: $SVC | Status: $STATUS | Health: $HEALTH"

                 # A service is considered degraded if it is not running,
                 # or if it has a healthcheck that has NOT reported "healthy".
                 IS_OK=true
                 if [ "$STATUS" != "running" ]; then
                   IS_OK=false
                 elif [ "$HEALTH" != "healthy" ] && [ "$HEALTH" != "no-healthcheck" ]; then
                   IS_OK=false
                 fi

                 if [ "$IS_OK" = "false" ]; then
                   LOGS=$(docker logs --tail 200 "$CONTAINER" 2>&1 || true)
                   FAILED="${FAILED}===SERVICE:${SVC}===\nStatus: ${STATUS}\nHealth: ${HEALTH}\n\`\`\`\n${LOGS}\n\`\`\`\n\n"
                 fi
               done

               printf "%s" "$FAILED"')

          # Expose the report to subsequent steps via GITHUB_OUTPUT
          if [ -n "$FAILED_REPORT" ]; then
            DELIMITER="EOF_$(openssl rand -hex 8)"
            {
              echo "failed_report<<${DELIMITER}"
              printf "%s" "$FAILED_REPORT"
              echo "${DELIMITER}"
            } >> "$GITHUB_OUTPUT"
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
            exit 1
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
            echo "==> All services are healthy."
          fi

      # ------------------------------------------------------------------
      # 4. If any service was degraded, open a GitHub Issue with the logs
      # ------------------------------------------------------------------
      - name: Open GitHub Issue for degraded services
        if: steps.health_check.outputs.has_failures == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
          FAILED_REPORT: ${{ steps.health_check.outputs.failed_report }}
        run: |
          TITLE="Deployment failure on main @ ${SHA:0:7}"
          BODY="## Deployment Health Check Failed

          One or more services did not reach a healthy state after the deployment triggered by commit [\`${SHA:0:7}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

          **Workflow run:** $RUN_URL

          ---

          ## Failing Services & Logs

          ${FAILED_REPORT}

          ---
          *This issue was opened automatically by the Deploy workflow.*"

          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues" \
            -d "$(jq -n \
                  --arg title "$TITLE" \
                  --arg body "$BODY" \
                  '{title: $title, body: $body, labels: ["bug", "deployment"]}')"

      # ------------------------------------------------------------------
      # 5. Fail the workflow if any service was degraded (so the commit is
      #    marked red on the repository page)
      # ------------------------------------------------------------------
      - name: Fail workflow on degraded services
        if: steps.health_check.outputs.has_failures == 'true'
        run: |
          echo "One or more services are degraded. See the GitHub Issue for details."
          exit 1
